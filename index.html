<!DOCTYPE html>
<html>
<head>
  
  <title>Photo Booth</title>

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">

  <link rel="stylesheet" href="style.css">
  </head>
<body>

  <!-- SESSION MENU -->
  <div id="menu">
    <h1>Photo Booth Setup</h1>

    <label>Select Session Duration:</label><br><br>

    <select id="duration">
      <option value="600">10 minutes</option>
      <option value="1200">20 minutes</option>
    </select>

    <br><br>
    <button onclick="startSession()">Start Session</button>
  </div>

  <!-- CAMERA AREA -->
  <div id="cameraSection" style="display:none;">

  <!-- HEADER -->
  <div>
    <h2 id="sessionName">Session</h2>
    <h3>Remaining Time: <span id="timer">00:00</span></h3>
  </div>

  <!-- MAIN CONTENT -->
  <div style="display:flex; gap:20px;">

    <!-- CAMERA -->
    <div id="cameraArea">
      <div class="preview-box">
        <video id="camera" autoplay playsinline></video>
      </div>
      <br><br>
      <button onclick="takePhoto()">Capture</button>
    </div>

    <!-- PREVIEW -->
    <div id="previewArea">
      <canvas id="previewCanvas" style="border:1px solid #ccc;"></canvas>
      <br><br>
      <button onclick="savePhoto()">Save</button>
      <button onclick="retakePhoto()">Retake Photo</button>
    </div>

  </div>

  <!-- CONTROLS (CLEARLY SEPARATED) -->
  <div id="controlPanel" style="margin-top:20px;">
    <button onclick="openAddModal()">+ Add Time</button>
    <button onclick="endSession()">End Session</button>
    <button onclick="backToMenu()">Back</button>
  </div>

</div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script src="renderer.js"></script>

  <!-- ADD SESSION POPUP -->
<div id="addSessionModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    min-width:250px;
  ">
    <h2>Add Session</h2>

    <select id="addDuration">
      <option value="600">10 minutes</option>
      <option value="1200">20 minutes</option>
    </select>

    <br><br>

    <button onclick="confirmAddTime()">Add</button>
    <button onclick="closeAddModal()">Cancel</button>
  </div>
</div>

  <!-- ERROR POPUP -->
<div id="errorModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    min-width:280px;
  ">
    <h2>Camera Error</h2>

    <p id="errorMessage"></p>

    <br>
    <button onclick="handleErrorClose()">Back</button>
  </div>
</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
">

  <h2>Preparing Camera...</h2>
  <p id="loadingStatus">Connecting to camera...</p>

</div>

</body>
</html>
